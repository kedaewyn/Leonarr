name: Release

# Builds the plugin and attaches a tarball to the GitHub release on every v*
# tag. Admins install via Oscarr → Admin → Plugins → "Install from URL" with
# the asset URL — no Docker image, no GHCR, no container restart needed
# (see https://github.com/arediss/Oscarr/blob/main/docs/plugins.md).

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write          # create release + upload assets
  security-events: write   # qodana SARIF upload
  pull-requests: write     # qodana annotations
  checks: write

jobs:
  # ─── 1. Code quality (non-blocking reporter) ──────────────────────
  # `continue-on-error: true` means Qodana findings are uploaded to the
  # Security tab but don't gate the downstream build step. Flip this to
  # false if you want Qodana findings to block a release outright.
  qodana:
    name: Qodana code quality
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Qodana Scan
        uses: JetBrains/qodana-action@v2025.3
        with:
          use-annotations: true
          github-token: ${{ github.token }}
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}

      - name: Upload Qodana SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: ${{ runner.temp }}/qodana/results/qodana.sarif.json
          category: qodana

  # ─── 2. Build + attach release tarball ─────────────────────────────
  release:
    name: Build & publish release tarball
    needs: qodana
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      # Pack only what Oscarr's plugin engine needs to load the plugin:
      # manifest, the compiled bundle, and package.json (for `discord.js`
      # which is kept external — Oscarr resolves it from node_modules at
      # plugin install time). frontend/ sources stay out, the compiled
      # output is already in dist/frontend/.
      - name: Pack tarball
        run: |
          version="${GITHUB_REF_NAME#v}"
          tar -czf "leonarr-${version}.tar.gz" \
            manifest.json \
            package.json \
            package-lock.json \
            README.md \
            LICENSE* \
            dist/
          ls -lh "leonarr-${version}.tar.gz"
          sha256sum "leonarr-${version}.tar.gz" > "leonarr-${version}.tar.gz.sha256"

      - name: Create GitHub release
        uses: ncipollo/release-action@2c591bcc8ecdcd2db72b97d6147f871fcd833ba5 # v1.14.0
        with:
          artifacts: "leonarr-*.tar.gz,leonarr-*.tar.gz.sha256"
          generateReleaseNotes: true
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
