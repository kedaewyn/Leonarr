name: CI

# Fast feedback loop on PRs:
#   - Node syntax check on every JS file (catches obvious breakage in unbundled scripts)
#   - typecheck (tsc --noEmit) on src/ + frontend/
#   - Production build (esbuild backend + esbuild frontend + Tailwind CSS)
#
# The release pipeline (qodana + tarball asset upload) lives in release.yml and
# only runs on push to main / tag v*. This workflow exists to catch obvious
# breakage on PRs without producing a release artefact.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  build:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Syntax-check every plain JS file
        run: |
          set -e
          failed=0
          while IFS= read -r -d '' f; do
            node --check "$f" || failed=1
          done < <(find . -type f -name '*.js' \
            -not -path './node_modules/*' \
            -not -path './dist/*' \
            -not -path './.git/*' \
            -print0)
          exit $failed

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Verify build artefacts exist
        run: |
          test -f dist/index.js
          test -f dist/frontend/index.js
          test -f dist/frontend/index.css
