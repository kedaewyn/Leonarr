services:
  leonarr-installer:
    image: ghcr.io/${GITHUB_OWNER:-kedaewyn}/leonarr:latest
    build:
      context: .
    container_name: leonarr-installer
    restart: "no"
    volumes:
      - oscarr-plugins:/plugins-out

volumes:
  oscarr-plugins:
    # The volume is owned by your Oscarr stack — reuse it, don't recreate.
    # Remove this whole section if you're using a host bind mount (Option B).
    external: true
